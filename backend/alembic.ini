[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .

# env.py prefers DATABASE_URL. This fallback targets the local Compose database.
# Alembic deliberately uses psycopg synchronously; application queries use asyncpg.
sqlalchemy.url = postgresql+psycopg://bourdain:bourdain@localhost:5432/bourdain

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
propagate = 0

[logger_alembic]
level = INFO
handlers = console
qualname = alembic
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
