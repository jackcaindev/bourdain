services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bourdain-postgres
    environment:
      POSTGRES_USER: bourdain
      POSTGRES_PASSWORD: bourdain
      POSTGRES_DB: bourdain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bourdain -d bourdain"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
